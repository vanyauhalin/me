name: release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
          registry-url: "https://npm.pkg.github.com"
          scope: "@vanyauhalin"
      - run: npm i -g pnpm && pnpm i --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm build
      - run: |
          raw="https://api.github.com/users/${{ github.actor }}"
          json=$(curl --silent -H 'Accept: application/json' $raw)
          id=$(echo $json | jq --raw-output '.id')
          git config --global user.name ${{ github.actor }}
          git config --global user.email \
            "$id+${{ github.actor }}@users.noreply.github.com"
      - run: |
          cd dist
          mkdir temp
          git clone \
            --quiet \
            --no-checkout \
            --single-branch \
            --branch "gh-pages" \
            "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            temp
          mv temp/.git .
          git add .
          git commit --quiet --message "$(date +'%H:%M %d.%m.%Y')"
          git push
